name: Run tests

on: [push, pull_request]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (${{ matrix.group }} - ${{ matrix.os }} - Julia ${{ matrix.julia-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Physics group (full OS matrix on stable Julia)
          - os: ubuntu-latest
            julia-version: '1'
            group: physics
          - os: windows-2025-vs2026
            julia-version: '1'
            group: physics
          - os: macos-latest
            julia-version: '1'
            group: physics
          # Physics group (other Julia versions on ubuntu-latest)
          - os: ubuntu-latest
            julia-version: 'lts'
            group: physics
          - os: ubuntu-latest
            julia-version: 'pre'
            group: physics

          # Rust FFI group (full OS matrix on stable Julia to verify FFI linking)
          - os: ubuntu-latest
            julia-version: '1'
            group: rust
          - os: windows-2025-vs2026
            julia-version: '1'
            group: rust
          - os: macos-latest
            julia-version: '1'
            group: rust

          # Simulation group — split into 3 parallel jobs to cut wall time:
          #   sim-interface    (~56 prop_capillary calls, the longest job)
          #   sim-multimode    (multimode + polarisation tests)
          #   sim-propagation  (radial, freespace, GNLSE, Kerr, Raman — lighter tests)
          - os: ubuntu-latest
            julia-version: '1'
            group: sim-interface
          - os: ubuntu-latest
            julia-version: '1'
            group: sim-multimode
          - os: ubuntu-latest
            julia-version: '1'
            group: sim-propagation

          # I/O group (ubuntu-latest only)
          - os: ubuntu-latest
            julia-version: '1'
            group: io

          # Fields group (ubuntu-latest only)
          - os: ubuntu-latest
            julia-version: '1'
            group: fields

    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "amalthea"


      - name: Run Rust unit tests
        if: matrix.group == 'rust'
        run: cargo test
        working-directory: amalthea
        env:
          RUSTFLAGS: "" # neutralize target-cpu=native from .cargo/config.toml

      # Build the release shared library so the Julia FFI tests can load it.
      # Must happen after `cargo test` (which builds debug) and before Julia runs.
      - name: Build Rust release library (for Julia FFI tests)
        if: matrix.group == 'rust'
        run: cargo build --release
        working-directory: amalthea
        env:
          RUSTFLAGS: "" # neutralize target-cpu=native from .cargo/config.toml

      - uses: julia-actions/setup-julia@v3
        with:
          version: ${{ matrix.julia-version }}
          arch: 'default'

      - name: Cache Julia packages
        uses: julia-actions/cache@v3

      - name: Install dependencies and build
        env:
          PYTHON: # remove PYTHON env variable to make sure packages are installed
        uses: julia-actions/julia-buildpkg@v1
        with:
          ignore-no-cache: true

      - name: Add Julia HDF5 artifacts to PATH (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $hdf5path = julia --project -e "using HDF5; print(HDF5.API.libhdf5)"
          $hdf5dir = Split-Path -Path $hdf5path -Parent
          echo "$hdf5dir" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Run tests
        uses: julia-actions/julia-runtest@v1
        env:
          JULIA_NUM_THREADS: auto
          LUNA_TEST_GROUP: ${{ matrix.group }}
          # Disable strict HDF5 file locking ONLY on Windows runners
          HDF5_USE_FILE_LOCKING: ${{ runner.os == 'Windows' && 'FALSE' || 'TRUE' }}

  benchmark:
    name: Native-path benchmark (regression guard)
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "amalthea"

      - uses: julia-actions/setup-julia@v3
        with:
          version: '1'
          arch: 'default'

      - name: Cache Julia packages
        uses: julia-actions/cache@v3

      - name: Install dependencies and build
        env:
          PYTHON: # remove PYTHON env variable to make sure packages are installed
        uses: julia-actions/julia-buildpkg@v1
        with:
          ignore-no-cache: true

      # BACKLOG.md Phase G.3 — a lone dedicated job (not part of the sharded
      # test matrix) so a slow/noisy shared runner can't contaminate the
      # timing with unrelated load. test/benchmark_native_default.jl hard-
      # asserts the fork's flagship default field-resolved workload (no env
      # toggles) actually picks RustNativeStepper — the Phase C / REVIEW.md
      # §3.2 regression, which showed up as a silent 0x-speedup fallback
      # with no CI failure at all until this job existed — then writes
      # native's own fixed-dt per-step wall time to a JSON file.
      - name: Run native-path benchmark
        run: julia --project test/benchmark_native_default.jl

      # Publishes to the gh-pages branch and tracks the value over commits;
      # comments + fails the job if a new measurement regresses sharply
      # against recent history. Only runs on push to main (not PRs) so PR
      # runs on forks/branches never need gh-pages write access and the
      # tracked history stays free of unmerged-branch noise.
      - name: Store benchmark result and check for regressions
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: 'customSmallerIsBetter'
          output-file-path: test/benchmark_result.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          # Documenter's deploydocs (documenter.yml) deploys push-to-main docs
          # under gh-pages:dev/ by default, clearing that folder on each
          # deploy. Keep benchmark history out of the way of that path
          # instead of at this action's own default (dev/bench).
          benchmark-data-dir-path: bench
          alert-threshold: '150%'
          comment-on-alert: true
          fail-on-alert: true

  python-test:
    name: Python API Test (ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Build Rust release library (for Julia FFI)
        run: cargo build --release
        working-directory: amalthea
        env:
          RUSTFLAGS: ""

      - uses: julia-actions/setup-julia@v3
        with:
          version: '1'

      - name: Cache Julia packages
        uses: julia-actions/cache@v3

      - name: Install Julia dependencies
        uses: julia-actions/julia-buildpkg@v1
        with:
          ignore-no-cache: true

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Python Package & pytest
        run: |
          python -m pip install --upgrade pip
          pip install pytest numpy h5py
          pip install -e ./python

      - name: Run Python API tests
        run: |
          pytest python/tests/
        env:
          PYTHON_JULIAPKG_JULIA: julia



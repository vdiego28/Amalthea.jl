name: Run tests

on: [push, pull_request]

jobs:
  test:
    name: Test (${{ matrix.group }} - ${{ matrix.os }} - Julia ${{ matrix.julia-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Physics group (full OS matrix on stable Julia)
          - os: ubuntu-latest
            julia-version: '1'
            group: physics
          - os: windows-2025-vs2026
            julia-version: '1'
            group: physics
          - os: macos-latest
            julia-version: '1'
            group: physics
          # Physics group (other Julia versions on ubuntu-latest)
          - os: ubuntu-latest
            julia-version: 'lts'
            group: physics
          - os: ubuntu-latest
            julia-version: 'pre'
            group: physics

          # Rust FFI group (full OS matrix on stable Julia to verify FFI linking)
          - os: ubuntu-latest
            julia-version: '1'
            group: rust
          - os: windows-2025-vs2026
            julia-version: '1'
            group: rust
          - os: macos-latest
            julia-version: '1'
            group: rust

          # Simulation group — split into 3 parallel jobs to cut wall time:
          #   sim-interface    (~56 prop_capillary calls, the longest job)
          #   sim-multimode    (multimode + polarisation tests)
          #   sim-propagation  (radial, freespace, GNLSE, Kerr, Raman — lighter tests)
          - os: ubuntu-latest
            julia-version: '1'
            group: sim-interface
          - os: ubuntu-latest
            julia-version: '1'
            group: sim-multimode
          - os: ubuntu-latest
            julia-version: '1'
            group: sim-propagation

          # I/O group (ubuntu-latest only)
          - os: ubuntu-latest
            julia-version: '1'
            group: io

          # Fields group (ubuntu-latest only)
          - os: ubuntu-latest
            julia-version: '1'
            group: fields

    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: luna-rust

      - name: Run Rust unit tests
        if: matrix.group == 'rust'
        run: cargo test
        working-directory: luna-rust
        env:
          CARGO_BUILD_RUSTFLAGS: "" # neutralize target-cpu=native from .cargo/config.toml

      # Build the release shared library so the Julia FFI tests can load it.
      # Must happen after `cargo test` (which builds debug) and before Julia runs.
      - name: Build Rust release library (for Julia FFI tests)
        if: matrix.group == 'rust'
        run: cargo build --release
        working-directory: luna-rust
        env:
          CARGO_BUILD_RUSTFLAGS: "" # neutralize target-cpu=native from .cargo/config.toml

      - uses: julia-actions/setup-julia@v3
        with:
          version: ${{ matrix.julia-version }}
          arch: 'default'

      - name: Cache Julia packages
        uses: julia-actions/cache@v3

      - name: Install dependencies and build
        env:
          PYTHON: # remove PYTHON env variable to make sure packages are installed
        uses: julia-actions/julia-buildpkg@v1
        with:
          ignore-no-cache: true

      - name: Add Julia HDF5 artifacts to PATH (Windows)
        if: matrix.group == 'rust' && runner.os == 'Windows'
        shell: pwsh
        run: |
          $hdf5path = julia --project -e "using HDF5; print(HDF5.API.libhdf5)"
          $hdf5dir = Split-Path -Path $hdf5path -Parent
          echo "$hdf5dir" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Run tests
        uses: julia-actions/julia-runtest@v1
        env:
          JULIA_NUM_THREADS: auto
          LUNA_TEST_GROUP: ${{ matrix.group }}

